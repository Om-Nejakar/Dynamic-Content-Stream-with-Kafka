<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef1f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background-color: #ffffff;
            padding: 50px 60px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 380px;
            transition: transform 0.2s ease-in-out;
        }

        .login-card:hover {
            transform: translateY(-3px);
        }

        h2 {
            color: #3f51b5;
            margin-bottom: 25px;
            font-size: 24px;
            letter-spacing: 0.5px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0 18px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #3f51b5;
            box-shadow: 0 0 5px rgba(63, 81, 181, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #3f51b5;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(63, 81, 181, 0.25);
        }

        button:hover {
            background-color: #303f9f;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(63, 81, 181, 0.35);
        }

        .error {
            color: #e53935;
            font-size: 14px;
            margin-top: 10px;
            background: #fdecea;
            padding: 8px;
            border-radius: 6px;
            display: inline-block;
            width: 100%;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 13px;
            color: #777;
        }

        .footer-text span {
            color: #3f51b5;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔐 Admin Login</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="Admin Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div class="footer-text">
            Dynamic Stream System • <span>Admin Portal</span>
        </div>
    </div>
</body>
</html>
